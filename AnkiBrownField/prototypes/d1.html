<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Know vs. Recognize</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">Litmus<small>Know vs. Recognize</small></div>
    <span class="pill">Exam in 63 days</span>
  </div>

  <a class="back" href="index.html">← all prototypes</a>

  <!-- SCORES -->
  <div class="card" style="margin-top:14px">
    <div class="eyebrow">Your two scores for “Bond duration”</div>
    <div class="meter">
      <div class="lab"><span>Memory — can you recall the fact?</span><span id="memVal">—</span></div>
      <div class="bar"><span class="fill-green" id="memBar" style="width:0%"></span></div>
    </div>
    <div class="meter">
      <div class="lab"><span>Performance — can you use it on a new question?</span><span id="perfVal">—</span></div>
      <div class="bar"><span class="fill-blue" id="perfBar" style="width:0%"></span></div>
    </div>
    <div id="gapBadge"></div>
  </div>

  <!-- FLOW -->
  <div class="card" id="stage">
    <!-- filled by JS -->
  </div>

  <p class="hint">Walk through it: recall the fact, then answer a brand-new question that uses it.</p>
</div>

<script>
const stage = document.getElementById('stage');
let memory = null, performance = null;

function setScores(){
  document.getElementById('memBar').style.width = (memory??0)+'%';
  document.getElementById('perfBar').style.width = (performance??0)+'%';
  document.getElementById('memVal').textContent = memory==null?'—':memory+'%';
  document.getElementById('perfVal').textContent = performance==null?'—':performance+'%';
  const gb = document.getElementById('gapBadge');
  if(memory!=null && performance!=null){
    const gap = memory-performance;
    gb.innerHTML = gap>10
      ? `<span class="gap-badge">⚠ ${gap}-point gap — you recognize it but can’t apply it yet</span>`
      : `<span class="gap-badge" style="background:var(--green-soft);color:#0b5c34">Gap closed — real mastery</span>`;
  } else gb.innerHTML='';
}

function recallStage(){
  stage.innerHTML = `
    <div class="eyebrow">Step 1 · Recall (memory)</div>
    <p class="q">What does a bond’s <b>Macaulay duration</b> measure?</p>
    <button class="btn secondary" id="reveal">Show answer</button>
    <div id="ans" style="display:none">
      <div class="callout" style="margin-top:12px">The weighted-average time until a bondholder receives the bond’s cash flows (in years).</div>
      <p class="small muted" style="margin:12px 0 6px">Did you recall it?</p>
      <div class="row">
        <button class="btn secondary" onclick="afterRecall(55)">Not really</button>
        <button class="btn" onclick="afterRecall(90)">Yes, I knew it</button>
      </div>
    </div>`;
  document.getElementById('reveal').onclick = ()=>{
    document.getElementById('ans').style.display='block';
    document.getElementById('reveal').style.display='none';
  };
}
function afterRecall(v){ memory=v; setScores(); applyStage(); }

function applyStage(){
  stage.classList.add('fade-in');
  stage.innerHTML = `
    <div class="eyebrow">Step 2 · Apply (performance)</div>
    <p class="q">A bond has a <b>modified duration of 7.2</b>. If its yield rises by 0.50%, the price will change by approximately:</p>
    <div id="opts">
      <button class="opt" data-c="1">−3.6%</button>
      <button class="opt" data-c="0">−0.36%</button>
      <button class="opt" data-c="0">+3.6%</button>
    </div>`;
  stage.querySelectorAll('.opt').forEach(o=>o.onclick=()=>grade(o));
}
function grade(chosen){
  const opts = stage.querySelectorAll('.opt');
  opts.forEach(o=>o.onclick=null);
  const correct = chosen.dataset.c==='1';
  opts.forEach(o=>{ if(o.dataset.c==='1') o.classList.add('correct'); });
  if(!correct) chosen.classList.add('wrong');
  performance = correct?85:45; setScores();
  const box = document.createElement('div');
  box.className='callout '+(correct?'green':'amber');
  box.style.marginTop='12px';
  box.innerHTML = (correct
    ? `✔ Right. Price change ≈ −(mod. duration × Δyield) = −(7.2 × 0.50%) = <b>−3.6%</b>.`
    : `Price change ≈ −(mod. duration × Δyield) = −(7.2 × 0.50%) = <b>−3.6%</b>. You knew the definition — but the exam asks you to <b>use</b> it.`);
  stage.appendChild(box);
  const next = document.createElement('button');
  next.className='btn'; next.style.marginTop='14px'; next.textContent='See what this means →';
  next.onclick=finalStage; stage.appendChild(next);
}
function finalStage(){
  const gap = memory-performance;
  stage.classList.add('fade-in');
  stage.innerHTML = `
    <div class="eyebrow">The point</div>
    <p class="q">Two honest numbers, never blended into one.</p>
    <div class="callout">${gap>10
      ? `You <b>recognized</b> the fact (Memory ${memory}%) but couldn’t <b>apply</b> it (Performance ${performance}%). That ${gap}-point gap is exactly what a passing score depends on — and what other apps hide.`
      : `Memory ${memory}% and Performance ${performance}% are close — you’ve actually mastered this, not just memorized the card.`}</div>
    <div class="callout amber" style="margin-top:12px"><b>Study next:</b> cards you recognize but can’t apply — ranked by exam weight × your weakness × days left.</div>
    <button class="btn" style="margin-top:14px" onclick="reset()">Try another card</button>`;
}
function reset(){ memory=null; performance=null; setScores(); recallStage(); }
recallStage(); setScores();
</script>
</body>
</html>
